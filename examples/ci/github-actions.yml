name: OAST Security Scan with GODNSLOG

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  GODNSLOG_API_URL: ${{ secrets.GODNSLOG_API_URL }}
  GODNSLOG_API_KEY: ${{ secrets.GODNSLOG_API_KEY }}

jobs:
  oast-scan:
    name: OAST Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      
      - name: Install GODNSLOG CLI
        run: |
          go install github.com/chennqqi/godnslog/cmd/cli@latest
      
      - name: Create Case
        run: |
          CASE_ID=$(godnslog case create \
            --title "CI/CD Scan - ${{ github.repository }}" \
            --description "Automated OAST scan triggered by ${{ github.event_name }}" \
            --target "${{ github.server_url }}/${{ github.repository }}" \
            --tags "ci-cd,github-actions" | grep "ID:" | awk '{print $2}')
          echo "CASE_ID=$CASE_ID" >> $GITHUB_ENV
          echo "Created case: $CASE_ID"
      
      - name: Generate Payload
        run: |
          PAYLOAD=$(godnslog payload create \
            --template "{{.Token}}.oast.example.com" \
            --case-id ${{ env.CASE_ID }} \
            --expires 24h | grep "Token:" | awk '{print $2}')
          echo "PAYLOAD=$PAYLOAD" >> $GITHUB_ENV
          echo "Generated payload: $PAYLOAD"
      
      - name: Run Nuclei Scan with OAST
        run: |
          docker run projectdiscovery/nuclei:latest \
            -u ${{ github.event.repository.html_url }} \
            -t oast-templates/ \
            -var "payload=${{ env.PAYLOAD }}" \
            -o nuclei-results.json
      
      - name: Poll for Interactions
        run: |
          godnslog interaction poll ${{ env.PAYLOAD }} \
            --timeout 10m \
            --interval 30s
      
      - name: Export Report
        run: |
          godnslog report export ${{ env.CASE_ID }} \
            --format markdown \
            --output oast-report.md
      
      - name: Upload Report
        uses: actions/upload-artifact@v4
        with:
          name: oast-report
          path: oast-report.md
      
      - name: Check for High-Risk Interactions (Gate)
        run: |
          INTERACTIONS=$(godnslog interaction list \
            --case-id ${{ env.CASE_ID }} \
            --limit 100)
          
          HIGH_RISK_PATTERNS="metadata|169.254|internal|192.168|10\.|admin|config|password|secret"
          CRITICAL_PATTERNS="root|privilege|escalation|exec|cmd|shell"
          
          HIGH_RISK_COUNT=0
          CRITICAL_COUNT=0
          
          for pattern in $HIGH_RISK_PATTERNS; do
            COUNT=$(echo "$INTERACTIONS" | grep -i "$pattern" | wc -l)
            HIGH_RISK_COUNT=$((HIGH_RISK_COUNT + COUNT))
          done
          
          for pattern in $CRITICAL_PATTERNS; do
            COUNT=$(echo "$INTERACTIONS" | grep -i "$pattern" | wc -l)
            CRITICAL_COUNT=$((CRITICAL_COUNT + COUNT))
          done
          
          echo "High-risk interactions: $HIGH_RISK_COUNT"
          echo "Critical interactions: $CRITICAL_COUNT"
          
          if [ $CRITICAL_COUNT -gt 0 ]; then
            echo "::error::Critical OAST interactions detected! Pipeline blocked."
            echo "::error::Manual security review required for case ${{ env.CASE_ID }}"
            exit 1
          fi
          
          if [ $HIGH_RISK_COUNT -gt 5 ]; then
            echo "::warning::Multiple high-risk OAST interactions detected!"
            echo "::warning::Manual review recommended for case ${{ env.CASE_ID }}"
            exit 1  # Fail the pipeline for multiple high-risk findings
          fi
          
          if [ $HIGH_RISK_COUNT -gt 0 ]; then
            echo "::warning::High-risk OAST interactions detected. Review recommended."
          fi
          
          echo "✓ Gate check passed"
      
      - name: Post Summary
        if: always()
        run: |
          echo "## OAST Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Case ID: ${{ env.CASE_ID }}" >> $GITHUB_STEP_SUMMARY
          echo "- Payload: ${{ env.PAYLOAD }}" >> $GITHUB_STEP_SUMMARY
          echo "- Report: [oast-report.md](artifacts/oast-report)" >> $GITHUB_STEP_SUMMARY
